name: Deploy

# Do not use GitHub caches in this file to defend against cache poisoning via forks.

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed

env:
  CLOJURE_CLI_VERSION: "1.12.0.1530"
  BABASHKA_VERSION: "1.12.197"

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.repository == 'typedclojure/typedclojure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: clojars
    env:
      DEPLOY_JDK: 11
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK ${{ env.DEPLOY_JDK }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.DEPLOY_JDK }}
      - name: Install Clojure CLI
        run: |
          curl -O https://download.clojure.org/install/linux-install-${{ env.CLOJURE_CLI_VERSION }}.sh
          chmod +x linux-install-${{ env.CLOJURE_CLI_VERSION }}.sh
          sudo ./linux-install-${{ env.CLOJURE_CLI_VERSION }}.sh
      - name: Install babashka
        run: |
          curl -s https://raw.githubusercontent.com/babashka/babashka/master/install | sudo bash -s -- --version ${{ env.BABASHKA_VERSION }}
          bb --version
      - name: Configure settings.xml
        run: |
          mkdir -p ~/.m2
          echo "<settings><servers><server><id>clojars</id><username>typedclojure-clojars</username><password>${{ secrets.ClojarsPassword }}</password></server></servers></settings>" > ~/.m2/settings.xml

      - name: Deploy
        run: ./script/deploy-actions.sh
      - run: rm -f ~/.m2/settings.xml
        if: ${{ always() }}

  deploy-docs:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      DEPLOY_JDK: 11
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK ${{ env.DEPLOY_JDK }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.DEPLOY_JDK }}
      - name: Install Clojure CLI
        run: |
          curl -O https://download.clojure.org/install/linux-install-${{ env.CLOJURE_CLI_VERSION }}.sh
          chmod +x linux-install-${{ env.CLOJURE_CLI_VERSION }}.sh
          sudo ./linux-install-${{ env.CLOJURE_CLI_VERSION }}.sh
      - name: Install babashka
        run: |
          curl -s https://raw.githubusercontent.com/babashka/babashka/master/install | sudo bash -s -- --version ${{ env.BABASHKA_VERSION }}
          bb --version
      - name: Build API docs
        run: ./script/build-docs.sh
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/codox
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
